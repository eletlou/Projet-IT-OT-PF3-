name: les_viviers_de_noirmoutier_client

services:
  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    container_name: les_viviers_mysql_client
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-les_viviers_de_noirmoutier}
    ports:
      - "${MYSQL_PUBLIC_PORT:-3305}:3306"
    volumes:
      - mysql_data_client:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping --silent -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" || exit 1",
        ]
      start_period: 90s
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: les_viviers_web_client
    restart: unless-stopped
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-les_viviers_de_noirmoutier}
      SESSION_SECRET: ${SESSION_SECRET}
      FLASK_DEBUG: 0
      OPCUA_TEST_ENDPOINT: ${OPCUA_TEST_ENDPOINT:-opc.tcp://172.30.30.20:4840}
      OPCUA_TEST_USERNAME: ${OPCUA_TEST_USERNAME:-}
      OPCUA_TEST_PASSWORD: ${OPCUA_TEST_PASSWORD:-}
      OPCUA_TEST_TIMEOUT: ${OPCUA_TEST_TIMEOUT:-3}
    ports:
      - "${APP_PORT:-5005}:5000"

volumes:
  mysql_data_client:
